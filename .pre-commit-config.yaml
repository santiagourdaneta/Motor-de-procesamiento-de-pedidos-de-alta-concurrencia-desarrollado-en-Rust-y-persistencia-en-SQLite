repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rustfmt
        description: Formateo de código según el estándar de Rust.
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: Clippy
        description: Linter para detectar malas prácticas y errores.
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false