<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE PEDIDOS | MONITOR</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { border: 1px solid #333; padding: 15px; background: #0d0d0d; box-shadow: 0 0 15px rgba(0,255,65,0.05); }
        .order-card { border-left: 3px solid #00ff41; padding: 10px; margin-bottom: 10px; background: #141414; animation: flicker 0.2s; }
        h2 { border-bottom: 1px solid #333; padding-bottom: 5px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes flicker { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h2>SISTEMA DE PEDIDOS</h2>
    <div class="grid">
        <div class="panel">
            <h3>PEDIDOS ENTRANTES</h3>
            <div id="orders-container">
                </div>
        </div>
        <div class="panel">
            <h3>STATUS</h3>
            <p> SOCKET: <span id="status">OFFLINE</span></p>
            <p> DB: ONLINE (negocio.db)</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('orders-container');
        const status = document.getElementById('status');
        const socket = new WebSocket('ws://' + window.location.host + '/ws');

        socket.onopen = () => { status.innerText = 'CONNECTED'; status.style.color = '#00ff41'; };
     socket.onmessage = (event) => {
         try {
             const data = JSON.parse(event.data);
             const card = document.createElement('div');
             card.className = 'order-card';

             const header = document.createElement('div');
             header.style.display = 'flex';
             header.style.justifyContent = 'space-between';
             header.style.borderBottom = '1px solid #333';

             const orderSpan = document.createElement('span');
             orderSpan.textContent = `ORDER #${data.order_id}`;

             const newSpan = document.createElement('span');
             newSpan.style.color = '#ffb400';
             newSpan.textContent = 'NUEVO';

             header.appendChild(orderSpan);
             header.appendChild(newSpan);

             const clienteP = document.createElement('p');
             const clienteStrong = document.createElement('strong');
             clienteStrong.textContent = 'CLIENTE:';
             clienteP.appendChild(clienteStrong);
             clienteP.appendChild(document.createTextNode(` ${data.cliente}`));

             const telP = document.createElement('p');
             const telStrong = document.createElement('strong');
             telStrong.textContent = 'TEL:';
             const telLink = document.createElement('a');
             const telefono = String(data.telefono ?? '');
             const telefonoDigits = telefono.replace(/\D/g, '');
             telLink.href = `https://wa.me/${telefonoDigits}`;
             telLink.style.color = '#00ff41';
             telLink.textContent = telefono;
             telP.appendChild(telStrong);
             telP.appendChild(document.createTextNode(' '));
             telP.appendChild(telLink);

             const direccionP = document.createElement('p');
             const direccionStrong = document.createElement('strong');
             direccionStrong.textContent = 'ENTREGA EN:';
             const direccionSpan = document.createElement('span');
             direccionSpan.style.color = '#fff';
             direccionSpan.textContent = String(data.direccion ?? '');
             direccionP.appendChild(direccionStrong);
             direccionP.appendChild(document.createTextNode(' '));
             direccionP.appendChild(direccionSpan);

             const hr = document.createElement('hr');
             hr.style.border = '1px dashed #333';

             const ul = document.createElement('ul');
             const items = Array.isArray(data.items) ? data.items : [];
             items.forEach(i => {
                 const li = document.createElement('li');
                 li.textContent = String(i);
                 ul.appendChild(li);
             });

             const totalDiv = document.createElement('div');
             totalDiv.style.textAlign = 'right';
             totalDiv.style.fontSize = '1.2em';
             const totalStrong = document.createElement('strong');
             const totalNumber = Number(data.total);
             totalStrong.textContent = `TOTAL: $${Number.isFinite(totalNumber) ? totalNumber.toFixed(2) : '0.00'}`;
             totalDiv.appendChild(totalStrong);

             card.appendChild(header);
             card.appendChild(clienteP);
             card.appendChild(telP);
             card.appendChild(direccionP);
             card.appendChild(hr);
             card.appendChild(ul);
             card.appendChild(totalDiv);

             container.prepend(card);
         } catch(e) { /* ... */ }
     };
        socket.onclose = () => { status.innerText = 'DISCONNECTED'; status.style.color = '#ff0000'; };
    </script>
</body>
</html>
