<!DOCTYPE html>
<html>
<head>
    <title>Nexus Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body class="section">
    <div class="container">
        <h1 class="title">Monitor de Pedidos</h1>
        <div id="status" class="tag is-warning">CONECTANDO...</div>
        <hr>
        <div id="pedidos-container" class="columns is-multiline"></div>
    </div>

    <script>
        const socket = new WebSocket('ws://' + window.location.host + '/ws');
        const container = document.getElementById('pedidos-container');
        const statusTag = document.getElementById('status');

        socket.onmessage = (event) => {
            if (event.data === "SISTEMA ONLINE") {
                statusTag.textContent = "SISTEMA ONLINE";
                statusTag.className = "tag is-success";
                return;
            }

            const order = JSON.parse(event.data);
            const card = `
                <div class="column is-4 order-card">
                    <div class="card">
                        <div class="card-content">
                            <p class="subtitle">${order.customer_name}</p>
                            <p>ID: ${order.id} | Total: <strong>$${order.total}</strong></p>
                            <span class="tag is-info">${order.status}</span>
                        </div>
                    </div>
                </div>`;
            container.innerHTML += card;
        };
    </script>
</body>
</html>
